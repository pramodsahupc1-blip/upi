<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        var errorHandler = function(e) {
          try {
            var msg = '';
            if (e) {
              if (typeof e.message === 'string') {
                msg = e.message;
              } else if (e.error && typeof e.error.message === 'string') {
                msg = e.error.message;
              } else {
                msg = String(e.message || (e.error && e.error.message) || '');
              }
            }
            if (
              msg.indexOf('Script error') > -1 ||
              msg.indexOf('ResizeObserver') > -1 ||
              msg.indexOf('Script ...') > -1 ||
              !msg ||
              msg === 'Script error.'
            ) {
              if (e && e.stopImmediatePropagation) e.stopImmediatePropagation();
              if (e && e.preventDefault) e.preventDefault();
              return true;
            }
          } catch (err) {}
        };
        window.addEventListener('error', errorHandler, true);
        window.onerror = function(message, source, lineno, colno, error) {
          try {
            var msg = typeof message === 'string' ? message : String(message || '');
            if (
              msg.indexOf('Script error') > -1 ||
              msg.indexOf('ResizeObserver') > -1 ||
              msg.indexOf('Script ...') > -1 ||
              !msg ||
              msg === 'Script error.'
            ) {
              return true;
            }
          } catch (err) {}
        };
        window.addEventListener('unhandledrejection', function(e) {
          try {
            var msg = '';
            if (e && e.reason) {
              if (typeof e.reason === 'string') {
                msg = e.reason;
              } else if (typeof e.reason.message === 'string') {
                msg = e.reason.message;
              } else {
                msg = String(e.reason || '');
              }
            }
            if (
              msg.indexOf('Script error') > -1 ||
              msg.indexOf('ResizeObserver') > -1 ||
              msg.indexOf('ResizeObserver loop') > -1 ||
              !msg ||
              msg === 'Script error.'
            ) {
              if (e && e.stopImmediatePropagation) e.stopImmediatePropagation();
              if (e && e.preventDefault) e.preventDefault();
            }
          } catch (err) {}
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
